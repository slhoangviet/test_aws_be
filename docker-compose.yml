version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: aws_test_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: aws_test_db
      MYSQL_USER: aws_user
      MYSQL_PASSWORD: aws_password
    ports:
      - '3306:3306'
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

